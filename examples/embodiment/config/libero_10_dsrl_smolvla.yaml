defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/smolvla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  job:
    chdir: false
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_10_dsrl_smolvla"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: 1
  save_interval: 40
  save_eval_video: False
  save_rollout_video: False
  num_execute_steps: 4
  eval_video_base_dir: ${runner.logger.log_path}/video/eval
  rollout_video_base_dir: ${runner.logger.log_path}/video/rollout

  resume_dir: null
  ckpt_path: null

wandb:
  key: ""
  host: ""
  entity: ""
  project: rlinf
  run: ${runner.logger.experiment_name}

algorithm:
  rollout_epoch: 8
  eval_rollout_epoch: 1
  update_epoch: 4

  gamma: 0.99
  gae_lambda: 0.95

  dsrl_ppo_clip: 0.2
  dsrl_max_log_ratio: 20.0
  dsrl_entropy_coef: 0.01

  dsrl_replay_buffer_size: 50000
  dsrl_replay_min_size: 1024
  dsrl_replay_batch_size: 256
  dsrl_q_updates_per_epoch: 100
  dsrl_q_tau: 0.005

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 16
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 480
  eval:
    total_num_envs: 10
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 480
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_eval_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/SmolVLA-LIBERO-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "ddp"
  micro_batch_size: 16
  global_batch_size: 128
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/SmolVLA-LIBERO-SFT"
    model_type: "smolvla"
    add_value_head: True
    state_dim: 8
    dsrl_noise_dim: 1600
    dsrl_hidden_dim: 256
    policy_noise_eps: 1.0e-6
    policy_noise_scale: 1.0
    policy_noise_bias: 0.0

  optim:
    lr: 5.0e-6
    dsrl_actor_lr: 1.0e-4
    dsrl_value_lr: 1.0e-4
    dsrl_q_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    disable: True
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
